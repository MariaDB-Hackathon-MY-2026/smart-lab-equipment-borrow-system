{% extends 'layouts/base.html' %}
{% load static %}
{% block content %}
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700;800&display=swap');
    .reset-shell,
    .reset-shell input,
    .reset-shell button { font-family: "Poppins", sans-serif; }
    .reset-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background:
            linear-gradient(rgba(1, 5, 10, 0.58), rgba(1, 5, 10, 0.58)),
            url("{% static 'img/background.jpg' %}") center / cover no-repeat fixed,
            #01050A;
    }
    .reset-box {
        width: 100%;
        max-width: 520px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 2rem;
        padding: 2rem;
        box-shadow: 0 60px 40px -30px rgba(0, 0, 0, 0.27);
    }
    .reset-logo {
        display: block;
        max-width: 230px;
        max-height: 100px;
        object-fit: contain;
        margin: 0 auto 1rem;
    }
    .heading h2 {
        margin: 0 0 0.25rem;
        color: #000;
        font-size: 1.9rem;
        font-weight: 600;
        text-align: center;
    }
    .heading p {
        margin: 0 0 1.75rem;
        color: #555;
        font-size: 0.9rem;
        text-align: center;
    }
    .input-wrap {
        position: relative;
        height: 35px;
        margin-bottom: 1.5rem;
    }
    .input-field {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 0;
        border-bottom: 1px solid #000;
        outline: none;
        background: transparent;
        padding: 0 48px 0 0;
        color: #151111;
        font-size: 0.95rem;
    }
    .input-wrap label {
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        color: #000;
        font-size: 0.95rem;
        pointer-events: none;
        transition: 0.3s;
    }
    .input-field.active {
        border-bottom-color: #155DA3;
    }
    .input-field.active + label {
        top: -2px;
        font-size: 0.75rem;
    }
    .toggle-password {
        position: absolute;
        right: 0;
        top: 50%;
        width: 32px;
        height: 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transform: translateY(-50%);
        border: 0;
        background: transparent;
        color: #6b7280;
        cursor: pointer;
    }
    .toggle-password svg {
        width: 24px;
        height: 20px;
        stroke: currentColor;
        fill: none;
        stroke-linecap: round;
    }
    .sign-btn,
    .sign-btn-main {
        width: 100%;
        height: 40px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        border: 0;
        border-radius: 0.8rem;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
    }
    .sign-btn { background: #01050A; }
    .sign-btn-main {
        margin-top: 0.8rem;
        background: #155DA3;
    }
    .sign-btn:hover,
    .sign-btn-main:hover { background: #FF4E32; }
</style>

<div class="reset-shell">
    <form method="post" class="reset-box" onsubmit="return validateResetPasswordForm()">
        {% csrf_token %}
        <img src="{% static 'img/lendr-large-logo-no-bg.png' %}" class="reset-logo" alt="lendr+">
        <div class="heading">
            <h2>Set New Password</h2>
            <p>Enter a new password for your lendr+ account.</p>
        </div>

        <div class="input-wrap">
            <input type="password" class="input-field" name="new_password" id="newPassword" minlength="8" required>
            <label>New Password</label>
            <button type="button" class="toggle-password" data-target="newPassword" aria-label="Press and hold to view password">
                <svg viewBox="0 0 28 20" aria-hidden="true">
                    <path d="M3 13.5C4.8 6.8 9.2 3 14 3s9.2 3.8 11 10.5" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
                    <circle cx="14" cy="13.5" r="4.2" fill="none" stroke="currentColor" stroke-width="2.8"/>
                </svg>
            </button>
        </div>
        <div class="input-wrap">
            <input type="password" class="input-field" name="confirm_password" id="confirmPassword" minlength="8" required>
            <label>Confirm Password</label>
            <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Press and hold to view password">
                <svg viewBox="0 0 28 20" aria-hidden="true">
                    <path d="M3 13.5C4.8 6.8 9.2 3 14 3s9.2 3.8 11 10.5" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
                    <circle cx="14" cy="13.5" r="4.2" fill="none" stroke="currentColor" stroke-width="2.8"/>
                </svg>
            </button>
        </div>

        <button type="submit" class="sign-btn"><i class="fas fa-key"></i> Reset Password</button>
        <button type="button" onclick="window.location.href = '{% url 'accounts:login' %}';" class="sign-btn-main"><i class="fas fa-arrow-left"></i> Back to Login</button>
    </form>
</div>

<script>
    document.querySelectorAll('.input-field').forEach(function(input) {
        const syncState = function() {
            input.classList.toggle('active', input === document.activeElement || input.value !== '');
        };
        input.addEventListener('focus', syncState);
        input.addEventListener('blur', syncState);
        input.addEventListener('input', syncState);
        syncState();
    });

    function showPasswordForHold(button) {
        const input = document.getElementById(button.dataset.target);
        if (!input) return;
        input.type = 'text';
    }

    function hidePasswordForHold(button) {
        const input = document.getElementById(button.dataset.target);
        if (!input) return;
        input.type = 'password';
    }

    document.querySelectorAll('.toggle-password').forEach(function(button) {
        button.addEventListener('mousedown', function(event) {
            event.preventDefault();
            showPasswordForHold(button);
        });
        ['mouseup', 'mouseleave'].forEach(function(eventName) {
            button.addEventListener(eventName, function() {
                hidePasswordForHold(button);
            });
        });
    });

    function validateResetPasswordForm() {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (newPassword !== confirmPassword) {
            alert('New password and confirm password do not match.');
            return false;
        }
        if (newPassword.length < 8) {
            alert('New password must be at least 8 characters long.');
            return false;
        }
        return true;
    }
</script>
{% endblock %}
