{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lendr | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <main class="mx-auto flex min-h-screen max-w-5xl items-center px-5 py-10 sm:px-8">
        <section class="w-full rounded-[2rem] bg-white p-8 shadow-xl shadow-slate-200/60 ring-1 ring-slate-200 sm:p-10">
            <div class="flex flex-col gap-6 sm:flex-row sm:items-center sm:justify-between">
                <div class="flex items-center gap-4">
                    <img src="{% static 'images/lendr-small-logo.jpg' %}" alt="Lendr mark" class="h-14 w-14 rounded-2xl object-cover">
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-[0.3em] text-sky-600">Signed In</p>
                        <h1 class="mt-2 text-3xl font-semibold tracking-tight">Welcome, {{ user.get_username }}</h1>
                    </div>
                </div>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="rounded-2xl bg-slate-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-sky-700">
                        Log Out
                    </button>
                </form>
            </div>

            <div class="mt-8 rounded-3xl border border-sky-100 bg-sky-50 p-6 text-slate-700">
                The login flow is working. This placeholder dashboard is just here so you can verify authentication before we build the real system pages.
            </div>
        </section>
    </main>
</body>
</html>
