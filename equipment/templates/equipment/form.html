{% extends 'layouts/base.html' %}
{% block content %}
<div class="border-b border-gray-200 pb-4 mb-8 flex items-center justify-between flex-wrap gap-4">
    <h1 class="text-2xl font-semibold tracking-normal text-gray-800 uppercase">{{ mode }} Equipment</h1>
</div>

<div class="elevated-card bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden w-full">
    <div class="px-6 py-4 border-b border-gray-100">
        <h4 class="text-sm font-semibold text-gray-700 uppercase tracking-wide">Equipment Details</h4>
    </div>
    <form method="post" class="p-6">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Asset Tag <span class="text-red-500">*</span></label>
                <input name="asset_tag" required value="{{ equipment.asset_tag }}" class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Equipment Name <span class="text-red-500">*</span></label>
                <input name="name" required value="{{ equipment.name }}" class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Category <span class="text-red-500">*</span></label>
                <select name="category" required class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors">
                    <option value="">Select category</option>
                    {% for category in category_options %}
                    <option value="{{ category }}" {% if equipment.category.name == category or equipment.category == category %}selected{% endif %}>{{ category }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Location <span class="text-red-500">*</span></label>
                <input name="lab_location" required value="{{ equipment.lab_location }}" class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Serial Number <span class="text-red-500">*</span></label>
                <input name="serial_number" required value="{{ equipment.serial_number }}" class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Condition <span class="text-red-500">*</span></label>
                <select name="condition" required class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors">
                    <option value="">Select condition</option>
                    {% for condition in condition_options %}
                    <option value="{{ condition }}" {% if equipment.condition == condition or not equipment.condition and condition == 'Good' %}selected{% endif %}>{{ condition }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Status <span class="text-red-500">*</span></label>
                <select name="status" required class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors">
                    <option value="">Select status</option>
                    {% for value,label in statuses %}
                    <option value="{{ value }}" {% if equipment.status == value or not equipment.status and value == 'available' %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Daily Penalty Rate <span class="text-gray-400">(MYR)</span></label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm font-semibold text-gray-500">MYR</span>
                    <input name="daily_penalty_rate" type="number" min="0" step="0.01" value="{{ equipment.daily_penalty_rate|default:'5.00' }}" class="w-full pl-16 pr-4 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors">
                </div>
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-2">Notes</label>
                <textarea name="notes" rows="4" placeholder="Add handling instructions, calibration details, known issues, or borrowing restrictions." class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500/20 focus:border-green-500 transition-colors">{{ equipment.notes }}</textarea>
            </div>
        </div>
        <div class="mt-6 flex justify-end gap-3">
            <a href="{% url 'equipment:manifest' %}" class="inline-flex items-center gap-2 px-6 py-2.5 text-sm font-semibold text-gray-700 bg-white border border-gray-200 hover:bg-gray-100 rounded-lg transition-colors"><i class="fa fa-times"></i> Cancel</a>
            <button class="inline-flex items-center gap-2 px-6 py-2.5 text-sm font-semibold text-white bg-green-600 hover:bg-green-700 rounded-lg transition-colors shadow-sm"><i class="fa fa-floppy-o"></i> Save Equipment</button>
        </div>
    </form>
</div>
{% endblock %}
